# ============================================================================
# Product Domain Spark Configuration
# ============================================================================
# Catalog-specific settings (URI, warehouse, credentials) are configured
# programmatically in data_generator.py for proper environment variable handling
# ============================================================================

# Iceberg Extensions (required globally)
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.defaultCatalog=lakehouse

# S3/Hadoop Configuration (applies to all applications)
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.connection.ssl.enabled=false
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem

# Performance & Compatibility
spark.sql.legacy.parquet.nanosAsLong=true